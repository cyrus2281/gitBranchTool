name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Build (linux)
        run: GOOS=linux go build ./...

      - name: Build (macos)
        run: GOOS=darwin go build ./...

      - name: Build (windows)
        run: GOOS=windows go build ./...
